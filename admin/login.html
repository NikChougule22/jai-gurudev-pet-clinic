<!-- admin/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | Jai Gurudev Pet Clinic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-teal-500 to-teal-700 rounded-full flex items-center justify-center text-white mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Staff Login</h1>
            <p class="text-gray-500 text-sm mt-2">Jai Gurudev Pet Clinic</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                       placeholder="doctor@jaigurudevclinic.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                       placeholder="••••••••">
            </div>

            <div id="errorMsg" class="hidden p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>

            <button type="submit" id="loginBtn" 
                    class="w-full bg-gradient-to-r from-teal-600 to-teal-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition flex items-center justify-center gap-2">
                <span>Sign In</span>
                <svg id="loadingSpinner" class="hidden animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            <p>Authorized personnel only</p>
            <p class="mt-1">Forgot password? Contact Dr.</p>
        </div>
    </div>

    <script src="../config.js"></script>
    <script>
        const supabaseClient = initSupabase();

        // Check if already logged in
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) redirectBasedOnRole(session.user);
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loadingSpinner');
            const errorDiv = document.getElementById('errorMsg');
            
            btn.disabled = true;
            spinner.classList.remove('hidden');
            errorDiv.classList.add('hidden');

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });

                if (error) throw error;

                // Successful login - redirect based on role
                await redirectBasedOnRole(data.user);

            } catch (error) {
                errorDiv.textContent = error.message === 'Invalid login credentials' 
                    ? 'Invalid email or password' 
                    : error.message;
                errorDiv.classList.remove('hidden');
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        });

        async function redirectBasedOnRole(user) {
            await syncStaffIdentity(supabaseClient, user);

            // Fetch user role from staff table
            const { data: staff, error } = await getStaffProfile(supabaseClient, user);

            if (error || !staff) {
                alert('User not found in staff database');
                await supabaseClient.auth.signOut();
                return;
            }

            // Store role in session storage for client-side checks
            sessionStorage.setItem('staffRole', staff.role);
            sessionStorage.setItem('staffName', staff.name);

            // Redirect based on role
            if (staff.role === 'admin') {
                window.location.href = 'dashboard.html?role=admin';
            } else {
                window.location.href = 'dashboard.html?role=staff';
            }
        }
    </script>
</body>
</html>
