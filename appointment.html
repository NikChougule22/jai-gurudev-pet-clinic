<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Jai Gurudev Pet Clinic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0fdfa; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .slot-selected { background: #0d9488; color: white; border-color: #0d9488; }
        .slot-booked { background: #fee2e2; color: #991b1b; cursor: not-allowed; opacity: 0.6; }
        .loading { opacity: 0.6; pointer-events: none; }
        @media (max-width: 640px) {
            #appointmentForm input,
            #appointmentForm select,
            #appointmentForm textarea {
                min-width: 0;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="glass border-b border-teal-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-teal-800 font-bold text-xl">
                <i data-lucide="arrow-left" class="w-5 h-5"></i> Back to Home
            </a>
            <h1 class="font-bold text-teal-900">Book Appointment</h1>
        </div>
    </nav>

    <main class="flex-grow py-12 px-4">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-gray-900 mb-2">Schedule Your Visit</h2>
                <p class="text-gray-600">Real-time availability • Instant confirmation</p>
            </div>

            <div class="grid md:grid-cols-3 gap-8">
                <div class="md:col-span-1 space-y-4">
                    <label class="block text-sm font-medium text-gray-700">Select Date</label>
                    <input type="date" id="appointmentDate" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
                    <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 text-sm text-amber-800">
                        <i data-lucide="info" class="w-4 h-4 inline mr-1"></i>
                        <span id="availabilityText">Select a date to see available slots</span>
                    </div>
                    <div class="space-y-2 text-sm">
                        <div class="flex items-center gap-2"><div class="w-4 h-4 border-2 border-gray-300 rounded"></div><span class="text-gray-600">Available</span></div>
                        <div class="flex items-center gap-2"><div class="w-4 h-4 bg-teal-600 rounded"></div><span class="text-gray-600">Selected</span></div>
                        <div class="flex items-center gap-2"><div class="w-4 h-4 bg-red-100 rounded border border-red-200"></div><span class="text-gray-600">Booked</span></div>
                    </div>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-3">Available Time Slots</label>
                    <div id="timeSlots" class="grid grid-cols-3 sm:grid-cols-4 gap-3">
                        <div class="col-span-full text-center py-12 text-gray-500">Please select a date first</div>
                    </div>
                </div>
            </div>

            <form id="appointmentForm" class="mt-10 bg-white rounded-2xl shadow-lg p-5 sm:p-8 border border-gray-100 hidden overflow-hidden">
                <h3 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                    <i data-lucide="user" class="w-5 h-5 text-teal-600"></i> Patient Information
                </h3>
                
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number *</label>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <input type="tel" id="phoneInput" name="phone" required pattern="[0-9]{10}" placeholder="10 digit number" class="w-full min-w-0 flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
                            <button type="button" onclick="checkExistingPatient()" class="w-full sm:w-auto px-4 py-3 sm:py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition text-sm font-medium whitespace-nowrap">Check History</button>
                        </div>
                        <p id="existingPatientMsg" class="mt-2 text-sm hidden"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Pet Owner Name *</label>
                        <input type="text" name="ownerName" required class="w-full min-w-0 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Pet Name *</label>
                        <input type="text" name="petName" required class="w-full min-w-0 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Pet Type *</label>
                        <select name="petType" required class="w-full min-w-0 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
                            <option value="">Select...</option>
                            <option value="dog">Dog (कुत्रा)</option>
                            <option value="cat">Cat (मांजर)</option>
                            <option value="bird">Bird (पक्षी)</option>
                            <option value="cow">Cow (गाय)</option>
                            <option value="buffalo">Buffalo (म्हैस)</option>
                            <option value="goat">Goat (शेळी)</option>
                            <option value="other">Other (इतर)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Pet Breed</label>
                        <input type="text" name="petBreed" placeholder="e.g., Labrador, Desi" class="w-full min-w-0 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Reason for Visit *</label>
                        <select name="reasonCategory" required class="w-full min-w-0 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 mb-2" onchange="toggleOtherReason(this)">
                            <option value="">Select reason...</option>
                            <option value="vaccination">Vaccination</option>
                            <option value="checkup">General Checkup</option>
                            <option value="illness">Illness / Symptoms</option>
                            <option value="surgery">Surgery Follow-up</option>
                            <option value="grooming">Grooming</option>
                            <option value="emergency">Emergency</option>
                            <option value="other">Other</option>
                        </select>
                        <textarea name="reasonDetails" required rows="2" class="w-full min-w-0 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" placeholder="Please describe symptoms or specific requirements..."></textarea>
                    </div>
                </div>

                <input type="hidden" name="selectedDate" id="selectedDate">
                <input type="hidden" name="selectedTime" id="selectedTime">

                <div class="mt-8 flex flex-col-reverse sm:flex-row gap-4">
                    <button type="button" onclick="goBackToSlots()" class="w-full sm:w-auto px-6 py-3 border-2 border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition">Back</button>
                    <button type="submit" id="submitBtn" class="w-full sm:flex-1 bg-gradient-to-r from-teal-600 to-teal-700 text-white py-3 rounded-lg font-semibold text-lg hover:shadow-lg transition transform hover:scale-[1.02] flex items-center justify-center gap-2">
                        <span>Confirm Appointment</span>
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </form>

            <div id="successMessage" class="hidden mt-10 bg-green-50 border border-green-200 rounded-2xl p-8 text-center">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="check" class="w-8 h-8 text-green-600"></i>
                </div>
                <h3 class="text-2xl font-bold text-gray-900 mb-2">Appointment Booked!</h3>
                <p class="text-gray-600 mb-6">We've sent a confirmation to your phone.</p>
                <div class="bg-white rounded-lg p-4 max-w-sm mx-auto text-left space-y-2 mb-6">
                    <div class="flex justify-between"><span class="text-gray-500">Date:</span> <span class="font-medium" id="confirmDate"></span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Time:</span> <span class="font-medium" id="confirmTime"></span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Token:</span> <span class="font-bold text-teal-600" id="confirmToken"></span></div>
                </div>
                <button onclick="location.reload()" class="bg-teal-600 text-white px-6 py-2 rounded-lg hover:bg-teal-700 transition">Book Another</button>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script>
        const supabaseClient = initSupabase();
        lucide.createIcons();

        let bookingSettings = getDefaultBookingSettings();
        let selectedSlot = null;
        let bookedSlots = [];
        let existingPatientProfile = null;

        const dateInput = document.getElementById('appointmentDate');
        const today = new Date().toISOString().split('T')[0];
        dateInput.min = today;
        dateInput.value = today;

        dateInput.addEventListener('change', loadAvailableSlots);

        async function loadAvailableSlots() {
            const date = dateInput.value;
            if (!date) return;

            const slotsContainer = document.getElementById('timeSlots');
            slotsContainer.innerHTML = '<div class="col-span-full text-center py-8"><div class="animate-spin w-8 h-8 border-4 border-teal-600 border-t-transparent rounded-full mx-auto"></div></div>';

            try {
                const { data: appointments, error } = await supabaseClient
                    .rpc('get_booked_slots', { p_date: date });

                if (error) throw error;

                bookedSlots = (appointments || []).map(a => a.appointment_time.substring(0, 5));
                slotsContainer.innerHTML = '';
                const allSlots = buildBookingSlots(bookingSettings);

                allSlots.forEach((timeStr) => {
                    const isBooked = bookedSlots.includes(timeStr);
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = `py-3 px-4 rounded-lg text-sm font-medium transition ${isBooked ? 'slot-booked' : 'border-2 border-gray-200 hover:border-teal-500 hover:bg-teal-50 slot-btn'}`;
                    btn.textContent = timeStr;
                    btn.disabled = isBooked;

                    if (!isBooked) btn.onclick = () => selectSlot(btn, timeStr, date);
                    slotsContainer.appendChild(btn);
                });

                if (allSlots.length === 0) {
                    slotsContainer.innerHTML = '<div class="col-span-full text-center text-amber-700 py-8">Booking is currently unavailable. Please contact the clinic.</div>';
                }

                const availableCount = Math.max(allSlots.length - bookedSlots.length, 0);
                document.getElementById('availabilityText').textContent = `${availableCount} slots available for ${new Date(date).toLocaleDateString('en-IN')}`;

            } catch (error) {
                console.error('Error loading slots:', error);
                slotsContainer.innerHTML = '<div class="col-span-full text-center text-red-600 py-8">Error loading slots. Please refresh.</div>';
            }
        }

        function selectSlot(btn, time, date) {
            document.querySelectorAll('.slot-btn').forEach(b => {
                b.classList.remove('slot-selected');
                b.classList.add('border-2', 'border-gray-200');
            });
            btn.classList.add('slot-selected');
            btn.classList.remove('border-2', 'border-gray-200');
            selectedSlot = { time, date };
            document.getElementById('appointmentForm').classList.remove('hidden');
            document.getElementById('appointmentForm').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('selectedDate').value = date;
            document.getElementById('selectedTime').value = time;
        }

        async function checkExistingPatient() {
            const phone = document.getElementById('phoneInput').value;
            if (phone.length !== 10) {
                alert('Please enter 10 digit phone number');
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .rpc('get_patient_booking_profile', { p_phone: phone });

                if (error) throw error;

                const patient = Array.isArray(data) ? data[0] : data;

                const msgEl = document.getElementById('existingPatientMsg');
                
                if (patient) {
                    existingPatientProfile = patient;
                    msgEl.innerHTML = `<span class="text-green-600 font-medium">✓ Welcome back!</span> Found record for ${patient.pet_name} (${patient.pet_type}). <a href="#" onclick="fillPatientData(); return false;" class="text-teal-600 underline">Auto-fill details</a>`;
                    msgEl.classList.remove('hidden');
                } else {
                    existingPatientProfile = null;
                    msgEl.innerHTML = `<span class="text-blue-600">New patient - will create record</span>`;
                    msgEl.classList.remove('hidden');
                }
            } catch (error) {
                console.log('New patient');
            }
        }

        async function initBookingSettings() {
            bookingSettings = await fetchBookingSettings(supabaseClient);
        }

        function fillPatientData() {
            if (!existingPatientProfile) {
                return;
            }

            document.querySelector('[name="ownerName"]').value = existingPatientProfile.owner_name;
            document.querySelector('[name="petName"]').value = existingPatientProfile.pet_name;
            document.querySelector('[name="petType"]').value = existingPatientProfile.pet_type;
            document.querySelector('[name="petBreed"]').value = existingPatientProfile.pet_breed || '';
        }

        function goBackToSlots() {
            document.getElementById('appointmentForm').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleOtherReason(select) {
            const details = document.querySelector('[name="reasonDetails"]');
            details.placeholder = select.value === 'other' ? 'Please specify the reason...' : 'Please describe symptoms or specific requirements...';
        }

        document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.classList.add('loading');
            submitBtn.innerHTML = '<div class="animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full"></div> Booking...';

            const formData = new FormData(e.target);
            
            const appointmentData = {
                appointment_date: formData.get('selectedDate'),
                appointment_time: formData.get('selectedTime') + ':00',
                owner_name: formData.get('ownerName'),
                phone: formData.get('phone'),
                pet_name: formData.get('petName'),
                pet_type: formData.get('petType'),
                pet_breed: formData.get('petBreed'),
                reason: formData.get('reasonCategory') + ': ' + formData.get('reasonDetails'),
                status: 'scheduled',
                is_walkin: false,
                created_by: 'website'
            };

            try {
                const { data: appointmentId, error } = await supabaseClient
                    .rpc('book_public_appointment', {
                        p_appointment_date: appointmentData.appointment_date,
                        p_appointment_time: appointmentData.appointment_time,
                        p_owner_name: appointmentData.owner_name,
                        p_phone: appointmentData.phone,
                        p_pet_name: appointmentData.pet_name,
                        p_pet_type: appointmentData.pet_type,
                        p_pet_breed: appointmentData.pet_breed,
                        p_reason: appointmentData.reason
                    });

                if (error) throw error;

                document.getElementById('appointmentForm').classList.add('hidden');
                document.getElementById('successMessage').classList.remove('hidden');
                document.getElementById('confirmDate').textContent = new Date(appointmentData.appointment_date).toLocaleDateString('en-IN');
                document.getElementById('confirmTime').textContent = formData.get('selectedTime');
                document.getElementById('confirmToken').textContent = String(appointmentId).substring(0, 8).toUpperCase();
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (error) {
                console.error('Booking error:', error);
                alert('Error booking appointment: ' + error.message);
                submitBtn.classList.remove('loading');
                submitBtn.innerHTML = '<span>Confirm Appointment</span><i data-lucide="arrow-right" class="w-5 h-5"></i>';
                lucide.createIcons();
            }
        });

        initBookingSettings().then(loadAvailableSlots);
    </script>
</body>
</html>
